
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaMaría | Agua purificada sin bidones para empresas</title>
    <meta name="description" content="Servicio mensual de agua purificada para empresas, comercios y oficinas. Equipos conectados a red, instalación, mantenimiento, recambio anual de filtro y soporte técnico 24 hs.">
    <link rel="icon" href="/iconos/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/iconos/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/iconos/favicon-96x96.png">
    <link rel="apple-touch-icon" href="/iconos/apple-touch-icon.png">
    <link rel="manifest" href="/iconos/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        .glass-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .text-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-gradient {
            background: linear-gradient(to right, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.4) 100%);
        }
        .hero-bg-image-layer {
            transition: opacity 1000ms ease-in-out;
            will-change: opacity;
        }
        .hero-heading-lock {
            display: inline-block;
        }
        .hero-heading-main,
        .hero-heading-support {
            display: block;
        }
        .hero-heading-support {
            width: 100%;
            margin-top: 0.18em;
            font-size: clamp(.35rem, 0.45em, 2.5rem);
            line-height: 1;
            letter-spacing: 0.065em;
            white-space: nowrap;
        }
        .hero-rotating-phrase {
            display: inline-grid;
            vertical-align: baseline;
            overflow: hidden;
            line-height: 1.05;
        }
        .hero-rotating-phrase > span {
            grid-area: 1 / 1;
            white-space: nowrap;
        }
        .hero-rotating-phrase__item {
            animation: hero-phrase-rotate 6s ease-in-out infinite;
            will-change: transform, opacity;
        }
        .service-step-number {
            color: rgb(248 250 252);
            animation: service-step-glow 6s ease-in-out infinite;
            will-change: color, opacity, transform, text-shadow;
        }
        .hero-rotating-phrase__item:nth-child(3) {
            animation-delay: 3s;
            opacity: 0;
            transform: translateY(0.5em);
        }
        @keyframes hero-phrase-rotate {
            0% {
                opacity: 0;
                transform: translateY(0.5em);
            }
            8%, 42% {
                opacity: 1;
                transform: translateY(0);
            }
            50%, 100% {
                opacity: 0;
                transform: translateY(-0.5em);
            }
        }
        @keyframes service-step-glow {
            0% {
                color: rgb(248 250 252);
                opacity: 0.9;
                transform: scale(1);
                text-shadow: none;
            }
            8%, 20% {
                color: rgb(103 232 249);
                opacity: 0.46;
                transform: scale(1.04);
                text-shadow: 0 14px 34px rgba(6, 182, 212, 0.12);
            }
            32%, 100% {
                color: rgb(248 250 252);
                opacity: 0.9;
                transform: scale(1);
                text-shadow: none;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .hero-bg-image-layer {
                transition: none;
            }
            .hero-rotating-phrase__item {
                animation: none;
            }
            .service-step-number {
                animation: none;
                color: rgb(207 250 254);
            }
            .hero-rotating-phrase__item:nth-child(2) {
                opacity: 1;
                transform: none;
            }
            .hero-rotating-phrase__item:nth-child(3) {
                display: none;
            }
        }
        @media (max-width: 639px) {
            .hero-heading-support {
                margin-top: 0.28em;
                font-size: 0.48em;
                letter-spacing: 0.01em;
                white-space: normal;
            }
        }
    </style>
<script type="importmap">
{

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body class="bg-[#fcfcfd] text-slate-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
